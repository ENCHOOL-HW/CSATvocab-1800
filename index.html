<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');

:root {
  --purple: #5C35A8;
  --purple-dark: #3D1F7A;
  --purple-light: #6B42C2;
  --purple-xlight: #8B6AD4;
  --purple-pale: #E8E2F8;
  --purple-card: #F2EEF9;
  --purple-border: #C9C0E8;
  --purple-bg: #F7F4FC;
  --white: #FFFFFF;
  --text: #1A1730;
  --text2: #3D3060;
  --text3: #8070AA;
  --red: #EF4444;
  --green: #059669;
  --green-card: #ECFDF5;
  --green-border: #6EE7B7;
  --shadow: 0 2px 12px rgba(92,53,168,0.10);
  --shadow-lg: 0 8px 32px rgba(92,53,168,0.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--purple-bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }

/* ── 홈 화면 ── */
#homeScreen { display: block; padding: 0 0 40px; overflow-x: hidden; }
#studyScreen { display: none; }

.home-header {
  background: var(--purple-dark);
  padding: 44px 24px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.home-header-badge {
  display: inline-block;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.35);
  color: rgba(255,255,255,0.9);
  font-size: 0.78rem;
  font-weight: 700;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 16px;
  position: relative;
  letter-spacing: 0.06em;
}
.home-header-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  position: relative;
  line-height: 1.4;
  margin-bottom: 2px;
}
.home-header-sub {
  font-size: 1.5rem;
  font-weight: 900;
  color: #fff;
  position: relative;
  line-height: 1.4;
  margin-bottom: 14px;
}
.home-header-desc {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.7);
  position: relative;
  font-weight: 400;
}

.home-stats { display: none; }

.section-title {
  padding: 20px 16px 10px;
  font-size: 0.75rem;
  font-weight: 800;
  color: var(--text3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.day-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 0 14px;
  box-sizing: border-box;
  max-width: 100%;
}
.day-card {
  background: var(--white);
  border: 1.5px solid var(--purple-border);
  border-radius: 14px;
  padding: 10px 4px;
  text-align: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 62px;
}
.day-card:active { transform: scale(0.95); }
.day-card-num {
  font-size: 0.62rem;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.05em;
  margin-bottom: 2px;
}
.day-card-label {
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--purple);
  line-height: 1.1;
}

/* ── 학습 화면 헤더 ── */
.study-header {
  background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple) 100%);
  padding: 14px 16px 12px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.back-btn {
  background: rgba(255,255,255,0.18); border: none;
  color: #fff; width: 36px; height: 36px; border-radius: 10px;
  font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.study-title-block { flex: 1; }
#studyTitle { font-size: 1.1rem; font-weight: 900; color: #fff; }
.study-count { font-size: 0.72rem; color: rgba(255,255,255,0.7); font-weight: 600; }

/* ── 모드 탭 ── */
.mode-tabs {
  background: var(--white);
  border-bottom: 1.5px solid var(--purple-border);
  position: sticky; top: 56px; z-index: 90;
}
.mode-tabs-row {
  display: flex;
  border-bottom: 1px solid var(--purple-border);
}
.mode-tabs-row:last-child { border-bottom: none; }
.mode-tab {
  flex: 1;
  padding: 10px 6px;
  font-size: 0.78rem; font-weight: 700;

.rand-score-row {

@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

const DAYS = Object.keys(VOCAB);

function buildHome(){
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = DAYS.map((d,i)=>`
    <div class="day-card" onclick="openDay('${d}')">
      <div class="day-card-num">Day</div>
      <div class="day-card-label">${i+1}</div>
    </div>
  `).join('');
}

function openDay(day){
  curDay = day; curList = [...VOCAB[day]]; dispList = [...curList];
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('studyScreen').style.display = 'block';
  document.getElementById('studyTitle').textContent = day;
  document.getElementById('dnLabel').textContent = day;
  updateDayNav(); switchMode('list'); window.scrollTo(0,0);
}

function goHome(){
  document.getElementById('studyScreen').style.display = 'none';
  document.getElementById('homeScreen').style.display = 'block';
  window.scrollTo(0,0);
}

function changeDay(dir){
  const idx = DAYS.indexOf(curDay), next = idx + dir;
  if(next < 0 || next >= DAYS.length) return;
  openDay(DAYS[next]);
}

function updateDayNav(){
  const idx = DAYS.indexOf(curDay);
  document.getElementById('dnPrev').disabled = idx === 0;
  document.getElementById('dnNext').disabled = idx === DAYS.length - 1;
  document.getElementById('dnLabel').textContent = curDay;
}

function switchMode(mode){
  ['listPane','fcPane','meaningPane','spellPane','randomPane'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
  const paneId = mode==='list'?'listPane':mode==='fc'?'fcPane':mode+'Pane';
  document.getElementById(paneId).style.display='block';
  if(mode==='list')    renderList();
  if(mode==='fc')      startFC();
  if(mode==='meaning') startMeaning();
  if(mode==='spell')   startSpell();
  if(mode==='random')  startRandom();
}

function renderList(){
  const list = document.getElementById('wordList');
  list.innerHTML = dispList.map((item,i)=>`
    <div class="word-item${(hideEng||hideKor)?' has-hidden':''}" style="animation-delay:${Math.min(i*0.02,0.4)}s" id="wi-${i}">
      <div class="word-eng${hideEng?' blur':''}"><span>${item.w}</span></div>
      <div class="word-kor${hideKor?' blur':''}">${item.m}</div>
      <button class="reveal-btn" onclick="revealItem(${i})"></button>
      <button class="spk-btn" onclick="speak('${item.w.replace(/'/g,"\\'")}',this)">🔊</button>
    </div>
  `).join('');
}

function revealItem(i){
  const el = document.getElementById('wi-'+i);

  el.classList.toggle('revealed');
}

function toggleKor(){ hideKor=!hideKor; document.getElementById('tKor').classList.toggle('on',hideKor); renderList(); }
function toggleEng(){ hideEng=!hideEng; document.getElementById('tEng').classList.toggle('on',hideEng); renderList(); }
function shuffleList(){ dispList=shuffle([...curList]); renderList(); }

function startFC(){
  fcList=[...curList]; fcIdx=0;
  document.getElementById('fcCard').classList.remove('flipped');
  updateFC();
}
function updateFC(){
  const card = document.getElementById('fcCard');
  const doUpdate = ()=>{
    const item = fcList[fcIdx];
    document.getElementById('fcWord').textContent = item.w;
    document.getElementById('fcMeaning').textContent = item.m;
    document.getElementById('fcEngSmall').textContent = item.w;
    document.getElementById('fcCounter').textContent = `${fcIdx+1} / ${fcList.length}`;
    document.getElementById('fcBar').style.width = `${(fcIdx+1)/fcList.length*100}%`;
    document.getElementById('fcPrev').disabled = fcIdx===0;
    document.getElementById('fcNext').disabled = fcIdx===fcList.length-1;
  };
  if(card.classList.contains('flipped')){ card.classList.remove('flipped'); setTimeout(doUpdate,460); } else { doUpdate(); }
}
function flipFC(){ document.getElementById('fcCard').classList.toggle('flipped'); }
function spkFC(e){ e.stopPropagation(); speak(document.getElementById('fcWord').textContent); }
function fcMove(dir){ fcIdx=Math.max(0,Math.min(fcList.length-1,fcIdx+dir)); updateFC(); }
function fcShuffle(){ fcList=shuffle([...curList]); fcIdx=0; document.getElementById('fcCard').classList.remove('flipped'); updateFC(); }

function startMeaning(){
  mList=shuffle([...curList]); mIdx=0; mC=0; mW=0; mWrongList=[];
  document.getElementById('mResult').classList.remove('show');
  document.getElementById('mRetryWrong').style.display='none';
  updateScores('m'); renderM();
}
function renderM(){
  if(mIdx>=mList.length){endMeaning();return;}
  const item=mList[mIdx];
  document.getElementById('mWord').textContent=item.m;
  document.getElementById('mC').textContent=mC;
  document.getElementById('mW').textContent=mW;
  document.getElementById('mL').textContent=mList.length-mIdx;
  const opts=shuffle([item,...getRandWrong(item,3)]);
  document.getElementById('mOpts').innerHTML=opts.map(o=>`
    <button class="qopt" onclick="answerM(this,'${esc(o.w)}','${esc(item.w)}',${mIdx})">${o.w}</button>
  `).join('');
  document.getElementById('mNext').classList.remove('show');
}
function answerM(btn,chosen,correct,idx){
  document.querySelectorAll('#mOpts .qopt').forEach(b=>{
    b.disabled=true;
    if(b.textContent.trim()===correct) b.classList.add('correct');
  });
  if(chosen===correct){ mC++; btn.classList.add('correct');}
  else{ mW++; btn.classList.add('wrong'); mWrongList.push(mList[idx]);}
  updateScores('m');
  document.getElementById('mNext').classList.add('show');
}
function nextQ(type){ if(type==='meaning'){mIdx++;renderM();} }
function endMeaning(){
  document.getElementById('mOpts').innerHTML='';
  document.getElementById('mNext').classList.remove('show');
  const r=document.getElementById('mResult'); r.classList.add('show');
  const pct=Math.round(mC/mList.length*100);
  document.getElementById('mEm').textContent=pct>=80?'🎉':pct>=50?'👍':'💪';
  document.getElementById('mSub').textContent=`${mList.length}문제 중 ${mC}개 정답 (${pct}%)`;
  if(mWrongList.length>0){ document.getElementById('mRetryWrong').style.display='inline-block'; document.getElementById('mRetryWrong').textContent=`틀린 ${mWrongList.length}문제 다시 풀기`; }
}

function startSpell(){
  spList=shuffle([...curList]); spIdx=0; spC=0; spW=0; spPending=false; spWrongList=[];
  document.getElementById('spResult').classList.remove('show');
  document.getElementById('spRetryWrong').style.display='none';
  document.getElementById('spWord').closest('.spell-q-box').style.display='block';
  updateScores('sp'); renderSpell();
}
function renderSpell(){
  if(spIdx>=spList.length){endSpell();return;}
  const item=spList[spIdx];
  document.getElementById('spWord').textContent=item.m;
  document.getElementById('spL').textContent=spList.length-spIdx;
  const inp=document.getElementById('spInput');
  inp.value=''; inp.className='spell-input';
  document.getElementById('spFb').textContent='';
  document.getElementById('spFb').className='spell-fb';
  spPending=false;
  setTimeout(()=>inp.focus(),50);
}
function submitSpell(){
  const item=spList[spIdx];
  const inp=document.getElementById('spInput');
  const val=inp.value.trim();
  if(!val) return;
  if(spPending){ spIdx++; renderSpell(); return; }
  const fb=document.getElementById('spFb');
  if(val.toLowerCase()===item.w.toLowerCase()){
    inp.className='spell-input ok'; fb.textContent='✅ 정답!'; fb.className='spell-fb ok'; spC++;
  } else {
    inp.className='spell-input ng'; fb.textContent=`❌ 정답: ${item.w}`; fb.className='spell-fb ng';
    inp.classList.add('shake'); setTimeout(()=>inp.classList.remove('shake'),350);
    spW++; spWrongList.push(item);
  }
  updateScores('sp'); spPending=true;
}
function endSpell(){
  document.getElementById('spWord').closest('.spell-q-box').style.display='none';
  const r=document.getElementById('spResult'); r.classList.add('show');
  const pct=Math.round(spC/spList.length*100);
  document.getElementById('spSub').textContent=`${spList.length}문제 중 ${spC}개 정답 (${pct}%)`;
  if(spWrongList.length>0){ document.getElementById('spRetryWrong').style.display='inline-block'; document.getElementById('spRetryWrong').textContent=`틀린 ${spWrongList.length}문제 다시 풀기`; }
}

function retryWrong(type){
  if(type==='meaning'){
    mList=shuffle([...mWrongList]); mIdx=0; mC=0; mW=0; mWrongList=[];
    document.getElementById('mResult').classList.remove('show');
    document.getElementById('mRetryWrong').style.display='none';
    updateScores('m'); renderM();
  } else {
    spList=shuffle([...spWrongList]); spIdx=0; spC=0; spW=0; spPending=false; spWrongList=[];
    document.getElementById('spResult').classList.remove('show');
    document.getElementById('spRetryWrong').style.display='none';
    document.getElementById('spWord').closest('.spell-q-box').style.display='block';
    updateScores('sp'); renderSpell();
  }
}

function startRandom(list){
  const src = list || curList;
  randItems = shuffle([...src]).map(item=>({ item, type: Math.random()<0.5?'eng':'kor' }));
  randGraded = false; randWrongItems = [];
  document.getElementById('randResult').classList.remove('show');
  document.getElementById('randScoreRow').style.display = 'none';
  document.getElementById('randRetryWrong').style.display = 'none';
  document.getElementById('randSubmitBtn').style.display = 'block';
  renderRandom();
}
function renderRandom(){
  const container = document.getElementById('randList');
  container.innerHTML = randItems.map((r,i)=>{
    const {item,type} = r;
    const given = type==='eng' ? item.w : item.m;
    const typeLabel = type==='eng' ? '한국어 뜻을 입력하세요' : '영어 단어를 입력하세요';
    const placeholder = type==='eng' ? '뜻 입력...' : '영어 입력...';
    return `
      <div class="rand-item" id="ri-${i}">
        <div class="rand-type">${typeLabel}</div>
        <div class="rand-given">${given}</div>
        <input class="rand-input" id="ri-inp-${i}" placeholder="${placeholder}"
          autocomplete="off" spellcheck="false"
          onkeydown="if(event.key==='Enter'){document.getElementById('ri-inp-${Math.min(i+1,randItems.length-1)}').focus()}"
          data-idx="${i}">
        <div class="rand-answer" id="ri-ans-${i}"></div>
      </div>
    `;
  }).join('');
  setTimeout(()=>{const f=document.getElementById('ri-inp-0');if(f)f.focus();},80);
}
function submitRandom(){
  if(randGraded){startRandom();return;}
  randGraded=true; randWrongItems=[];
  let correct=0;
  randItems.forEach((r,i)=>{
    const inp=document.getElementById('ri-inp-'+i);
    const row=document.getElementById('ri-'+i);
    const ansEl=document.getElementById('ri-ans-'+i);
    if(!inp) return;
    const val=inp.value.trim();
    const answer = r.type==='eng' ? r.item.m : r.item.w;
    inp.disabled=true;
    const clean=s=>s.toLowerCase().replace(/\([^)]*\)/g,'').replace(/\[[^\]]*\]/g,'').replace(/[~\-_.,!?]/g,'').replace(/\s+/g,'').trim();
    let isCorrect=false;
    if(r.type==='kor'){ isCorrect=clean(val)===clean(answer); }
    else { const answers=answer.split(/[,，]/).map(a=>clean(a)); const cv=clean(val); isCorrect=cv.length>0&&answers.some(a=>a.length>0&&(a===cv||a.includes(cv)||cv.includes(a))); }
    if(isCorrect){ correct++; row.classList.add('correct'); inp.classList.add('ok'); }
    else { row.classList.add('wrong'); inp.classList.add('ng'); ansEl.textContent='정답: '+answer; ansEl.classList.add('show'); randWrongItems.push(r); }
  });
  const total=randItems.length, pct=Math.round(correct/total*100);
  document.getElementById('randScoreRow').style.display='flex';
  document.getElementById('randSubmitBtn').style.display='none';
  document.getElementById('randC').textContent=correct;
  document.getElementById('randW').textContent=total-correct;
  document.getElementById('randEm').textContent=pct>=80?'🎉':pct>=50?'👍':'💪';
  document.getElementById('randSub').textContent=`${total}문제 중 ${correct}개 정답 (${pct}%)`;
  document.getElementById('randResult').classList.add('show');
  if(randWrongItems.length>0){ const btn=document.getElementById('randRetryWrong'); btn.style.display='inline-block'; btn.textContent=`틀린 ${randWrongItems.length}단어 다시 풀기`; }
  const fw=document.querySelector('.rand-item.wrong');
  if(fw) fw.scrollIntoView({behavior:'smooth',block:'center'});
}
function retryWrongRandom(){ startRandom(randWrongItems.map(r=>r.item)); }

function updateScores(prefix){
  if(prefix==='m'){ document.getElementById('mC').textContent=mC; document.getElementById('mW').textContent=mW; document.getElementById('mL').textContent=Math.max(0,mList.length-mIdx); }
  else { document.getElementById('spC').textContent=spC; document.getElementById('spW').textContent=spW; document.getElementById('spL').textContent=Math.max(0,spList.length-spIdx); }
}
function getRandWrong(item,n){ return shuffle(curList.filter(x=>x.w!==item.w)).slice(0,n); }
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function esc(s){ return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function setBestVoices(){ if(!('speechSynthesis' in window)) return; englishVoices=window.speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().startsWith('en')); }
function getBestVoice(){ if(!englishVoices.length) return null; for(const name of ['Samantha','Daniel','Alex','Karen','Google US English','Microsoft Aria Online']){ const v=englishVoices.find(v=>v.name.includes(name)); if(v) return v; } return englishVoices.find(v=>v.lang.toLowerCase()==='en-us')||englishVoices[0]; }
if('speechSynthesis' in window){ setBestVoices(); window.speechSynthesis.onvoiceschanged=setBestVoices; }
function speak(word,btn){ if(!('speechSynthesis' in window)) return; if(speakTimer){clearTimeout(speakTimer);speakTimer=null;} try{window.speechSynthesis.cancel();}catch(e){} isSpeaking=false; const u=new SpeechSynthesisUtterance(word); u.lang='en-US';u.rate=0.95;u.pitch=1;u.volume=1; const v=getBestVoice(); if(v){u.voice=v;u.lang=v.lang;} u.onstart=()=>{isSpeaking=true;if(btn)btn.classList.add('playing');}; u.onend=()=>{isSpeaking=false;if(btn)btn.classList.remove('playing');}; u.onerror=()=>{isSpeaking=false;if(btn)btn.classList.remove('playing');}; speakTimer=setTimeout(()=>{if(!isSpeaking)window.speechSynthesis.speak(u);speakTimer=null;},60); }

buildHome();
</script>
